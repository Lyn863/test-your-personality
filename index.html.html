            --warning-color: #f59e0b;
            --error-color: #ef4444;

            color: var(--text-primary);
            line-height: 1.6;
        }

            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
        }

            background-color: var(--card-background);
            border-radius: 1rem;

            margin-bottom: 2rem;
        }

            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
            text-align: center;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background-color: var(--secondary-color);
            color: white;
        }
        
        .btn-secondary:hover {
            background-color: #db2777;
            transform: translateY(-2px);
        }
        
        .btn-outline {
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            background-color: transparent;
        }
        
        .btn-outline:hover {
            background-color: var(--primary-color);
            color: white;
        }
        
        .progress-bar {
            height: 8px;
            background-color: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        
        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }
        
        .option {
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .option:hover {
            border-color: var(--primary-color);
            background-color: #f9fafb;
        }
        
        .option.selected {
            border-color: var(--primary-color);
            background-color: rgba(79, 70, 229, 0.1);
        }
        
        .option-score {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        
        .score-btn {
            flex: 1;
            padding: 0.5rem;
            text-align: center;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .score-btn:first-child {
            border-radius: 0.5rem 0 0 0.5rem;
        }
        
        .score-btn:last-child {
            border-radius: 0 0.5rem 0.5rem 0;
        }
        
        .score-btn:hover {
            background-color: #f9fafb;
        }
        
        .score-btn.selected {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .radio-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .radio-option {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .radio-option input[type="radio"] {
            margin-right: 0.5rem;
        }
        
        .text-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .text-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .result-card {
            text-align: center;
            padding: 2rem;
        }
        
        .result-icon {
            width: 150px;
            height: 150px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .result-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .dimension-bar {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .dimension-label {
            width: 80px;
            font-weight: 500;
        }
        
        .dimension-progress {
            flex: 1;
            height: 8px;
            background-color: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin: 0 1rem;
        }
        
        .dimension-fill {
            height: 100%;
            transition: width 1s ease;
        }
        
        .dimension-score {
            width: 40px;
            text-align: right;
            font-weight: 500;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e5e7eb;
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .hidden {
            display: none;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            margin-top: 2rem;
        }
        
        .btn-group .btn {
            flex: 1;
        }

            .card {
                padding: 1.5rem;
            }

            }

                flex-direction: column;
                gap: 0.5rem;
            }

            {

                icon: "https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/960f175e61a84b058a53a71413e36822~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202605191249250A33FF5347A5CA90E232&rrcfp=f06b921b&x-expires=1781758268&x-signature=VQksfnJiqoAZ%2BQfBTlKhrp%2BHMIw%3D"
            },
            {
                id: 10,
                name: "老辈子",
                dimensions: { O: "low", C: "high", N: "medium", E: "low", A: "high" },
                description: "尊重传统，不喜欢新潮或争议性观点。做事认真、有条理，遵守规则。性格安静，待人礼貌但保持距离。情绪稳定略有忧虑。适合需要规范和耐心的职业。",
                icon: "https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/254f7e87614b44c9925fe0c8f115dacb~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202605191249250A33FF5347A5CA90E232&rrcfp=f06b921b&x-expires=1781758296&x-signature=B5HbPzHojgWM%2F7YKVRsU31YB9VQ%3D"
            }
        ];

        // 维度得分范围
        const dimensionRanges = {
            N: { min: 8, max: 40, low: 19, medium: 29 },
            E: { min: 9, max: 45, low: 21, medium: 33 },
            O: { min: 8, max: 40, low: 19, medium: 29 },
            A: { min: 7, max: 35, low: 16, medium: 26 },
            C: { min: 8, max: 40, low: 19, medium: 29 }
        };

        // 全局变量
        let currentQuestionIndex = 0;
        const userAnswers = {};
        const dimensionScores = { E: 0, O: 0, A: 0, C: 0, N: 0 };
        const dimensionCounts = { E: 0, O: 0, A: 0, C: 0, N: 0 };

        // DOM元素
        const welcomePage = document.getElementById('welcome-page');
        const testPage = document.getElementById('test-page');
        const loadingPage = document.getElementById('loading-page');
        const resultPage = document.getElementById('result-page');
        const startTestBtn = document.getElementById('start-test');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const questionNumber = document.getElementById('question-number');
        const questionProgress = document.getElementById('question-progress');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const progressFill = document.getElementById('progress-fill');
        const personalityType = document.getElementById('personality-type');
        const personalityIcon = document.getElementById('personality-icon');
        const personalityDescription = document.getElementById('personality-description');
        const dimensionsContainer = document.getElementById('dimensions-container');
        const shareBtn = document.getElementById('share-btn');
        const retakeBtn = document.getElementById('retake-btn');

        // 事件监听器
        startTestBtn.addEventListener('click', startTest);
        prevBtn.addEventListener('click', showPreviousQuestion);
        nextBtn.addEventListener('click', showNextQuestion);
        shareBtn.addEventListener('click', shareResult);
        retakeBtn.addEventListener('click', retakeTest);

        // 开始测试
        function startTest() {
            welcomePage.classList.add('hidden');
            testPage.classList.remove('hidden');
            showQuestion(currentQuestionIndex);
        }

        // 显示当前问题
        function showQuestion(index) {
            const question = questions[index];
            questionNumber.textContent = `问题 ${index + 1}/${questions.length}`;
            questionProgress.textContent = `${index + 1}/${questions.length}`;
            questionText.textContent = question.text;
            progressFill.style.width = `${(index / questions.length) * 100}%`;

            // 更新按钮状态
            prevBtn.disabled = index === 0;
            nextBtn.textContent = index === questions.length - 1 ? '完成测试' : '下一题';

            // 清空选项容器
            optionsContainer.innerHTML = '';

            // 根据问题类型生成选项
            switch (question.type) {
                case 'score':
                    createScoreOptions(question);
                    break;
                case 'radio':
                    createRadioOptions(question);
                    break;
                case 'select':
                    createSelectOptions(question);
                    break;
                case 'text':
                    createTextInput(question);
                    break;
            }
        }

        // 创建评分选项
        function createScoreOptions(question) {
            const scoreLabels = ['非常不符合', '比较不符合', '一般', '比较符合', '非常符合'];
            const scoreContainer = document.createElement('div');
            scoreContainer.className = 'option-score';

            for (let i = 1; i <= 5; i++) {
                const scoreBtn = document.createElement('div');
                scoreBtn.className = `score-btn ${userAnswers[question.id] === i ? 'selected' : ''}`;
                scoreBtn.innerHTML = `
                    <div class="font-bold">${i}</div>
                    <div class="text-xs">${scoreLabels[i - 1]}</div>
                `;
                scoreBtn.addEventListener('click', () => {
                    document.querySelectorAll('.score-btn').forEach(btn => btn.classList.remove('selected'));
                    scoreBtn.classList.add('selected');
                    userAnswers[question.id] = i;
                });
                scoreContainer.appendChild(scoreBtn);
            }

            optionsContainer.appendChild(scoreContainer);
        }

        // 创建单选选项
        function createRadioOptions(question) {
            const radioGroup = document.createElement('div');
            radioGroup.className = 'radio-group';

            question.options.forEach(option => {
                const radioOption = document.createElement('div');
                radioOption.className = 'radio-option';
                radioOption.innerHTML = `
                    <input type="radio" id="option-${question.id}-${option}" name="question-${question.id}" value="${option}" ${userAnswers[question.id] === option ? 'checked' : ''}>
                    <label for="option-${question.id}-${option}">${option}</label>
                `;
                radioOption.querySelector('input').addEventListener('change', (e) => {
                    userAnswers[question.id] = e.target.value;
                });
                radioGroup.appendChild(radioOption);
            });

            optionsContainer.appendChild(radioGroup);
        }

        // 创建下拉选择选项
        function createSelectOptions(question) {
            const select = document.createElement('select');
            select.className = 'text-input';
            select.id = `select-${question.id}`;

            const defaultOption = document.createElement('option');
            defaultOption.value = '';
            defaultOption.textContent = '请选择';
            defaultOption.selected = userAnswers[question.id] === undefined;
            select.appendChild(defaultOption);

            question.options.forEach(option => {
                const optionElement = document.createElement('option');
                optionElement.value = option;
                optionElement.textContent = option;
                optionElement.selected = userAnswers[question.id] === option;
                select.appendChild(optionElement);
            });

            select.addEventListener('change', (e) => {
                userAnswers[question.id] = e.target.value;
            });

            optionsContainer.appendChild(select);
        }

        // 创建文本输入
        function createTextInput(question) {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'text-input';
            input.id = `text-${question.id}`;
            input.placeholder = '请输入...';
            input.value = userAnswers[question.id] || '';
            input.addEventListener('input', (e) => {
                userAnswers[question.id] = e.target.value;
            });

            optionsContainer.appendChild(input);
        }

        // 显示上一题
        function showPreviousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion(currentQuestionIndex);
            }
        }

        // 显示下一题或完成测试
        function showNextQuestion() {
            const currentQuestion = questions[currentQuestionIndex];
            
            // 检查是否已回答当前问题
            if (userAnswers[currentQuestion.id] === undefined) {
                alert('请回答当前问题');
                return;
            }

            if (currentQuestionIndex === questions.length - 1) {
                completeTest();
            } else {
                currentQuestionIndex++;
                showQuestion(currentQuestionIndex);
            }
        }

        // 完成测试
        function completeTest() {
            testPage.classList.add('hidden');
            loadingPage.classList.remove('hidden');

            // 计算得分
            calculateScores();

            // 延迟显示结果，模拟加载过程
            setTimeout(() => {
                loadingPage.classList.add('hidden');
                resultPage.classList.remove('hidden');
                showResult();
            }, 2000);
        }

        // 计算各维度得分
        function calculateScores() {
            // 重置得分
            for (const dimension in dimensionScores) {
                dimensionScores[dimension] = 0;
                dimensionCounts[dimension] = 0;
            }

            // 计算各维度得分
            for (let i = 0; i < 40; i++) { // 只计算前40题
                const question = questions[i];
                const answer = userAnswers[question.id];
                
                if (answer !== undefined && question.dimension !== 'none') {
                    let score = answer;
                    
                    // 反向计分
                    if (question.direction === 'negative') {
                        score = 6 - answer; // 1↔5, 2↔4, 3↔3
                    }
                    
                    dimensionScores[question.dimension] += score;
                    dimensionCounts[question.dimension]++;
                }
            }
        }

        // 显示测试结果
        function showResult() {
            // 确定各维度高低
            const dimensionLevels = {};
            for (const dimension in dimensionScores) {
                const score = dimensionScores[dimension];
                const range = dimensionRanges[dimension];
                
                if (score <= range.low) {
                    dimensionLevels[dimension] = 'low';
                } else if (score <= range.medium) {
                    dimensionLevels[dimension] = 'medium';
                } else {
                    dimensionLevels[dimension] = 'high';
                }
            }

            // 匹配人格类型
            let matchedType = personalityTypes[0]; // 默认类型
            
            // 寻找最匹配的类型
            let bestMatchScore = 0;
            
            for (const type of personalityTypes) {
                let matchScore = 0;
                
                // 计算匹配度
                for (const dimension in dimensionLevels) {
                    if (type.dimensions[dimension] === dimensionLevels[dimension]) {
                        matchScore++;
                    }
                }
                
                if (matchScore > bestMatchScore) {
                    bestMatchScore = matchScore;
                    matchedType = type;
                }
            }

            // 显示结果
            personalityType.textContent = matchedType.name;
            personalityIcon.src = matchedType.icon;
            personalityIcon.alt = matchedType.name;
            personalityDescription.textContent = matchedType.description;

            // 显示维度条形图
            dimensionsContainer.innerHTML = '';
            const dimensionLabels = { E: '外向性', O: '开放性', A: '宜人性', C: '尽责性', N: '神经质' };
            const dimensionColors = { E: '#3b82f6', O: '#8b5cf6', A: '#10b981', C: '#f59e0b', N: '#ef4444' };

            for (const dimension in dimensionScores) {
                const range = dimensionRanges[dimension];
                const percentage = ((dimensionScores[dimension] - range.min) / (range.max - range.min)) * 100;
                
                const dimensionBar = document.createElement('div');
                dimensionBar.className = 'dimension-bar';
                dimensionBar.innerHTML = `
                    <div class="dimension-label">${dimensionLabels[dimension]}</div>
                    <div class="dimension-progress">
                        <div class="dimension-fill" style="width: 0%; background-color: ${dimensionColors[dimension]}"></div>
                    </div>
                    <div class="dimension-score">${dimensionScores[dimension]}</div>
                `;
                
                dimensionsContainer.appendChild(dimensionBar);
                
                // 动画效果
                setTimeout(() => {
                    const fill = dimensionBar.querySelector('.dimension-fill');
                    fill.style.width = `${percentage}%`;
                }, 300);
            }
        }

        // 分享结果
        function shareResult() {
            if (navigator.share) {
                navigator.share({
                    title: '我的校园人格测试结果',
                    text: `我是${personalityType.textContent}！来测试看看你的校园人格类型吧！`,
                    url: window.location.href
                });
            } else {
                // 复制链接到剪贴板
                const url = window.location.href;
                navigator.clipboard.writeText(url).then(() => {
                    alert('链接已复制到剪贴板，分享给好友吧！');
                });
            }
        }

        // 重新测试
        function retakeTest() {
            // 重置全局变量
            currentQuestionIndex = 0;
            Object.keys(userAnswers).forEach(key => delete userAnswers[key]);
            for (const dimension in dimensionScores) {
                dimensionScores[dimension] = 0;
                dimensionCounts[dimension] = 0;
            }

            // 返回测试页面
            resultPage.classList.add('hidden');
            testPage.classList.remove('hidden');
            showQuestion(currentQuestionIndex);
        }
    </script>
